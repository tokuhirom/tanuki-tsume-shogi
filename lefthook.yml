pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.js"
      run: npx oxlint src/app.js src/shogi-core.js scripts/*.js
    clippy:
      glob: "*.rs"
      run: cd generator && cargo clippy -- -D warnings

pre-push:
  parallel: true
  commands:
    test-rust:
      run: cd generator && cargo test
    test-e2e:
      run: npx vite build && npx playwright test
